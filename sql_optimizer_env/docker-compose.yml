services:
  # ── The environment server ─────────────────────────────────────────────────
  sql-optimizer-env:
    build:
      context: .
      dockerfile: server/Dockerfile
      args:
        BUILD_MODE: standalone
    # Use the image name you built with 'openenv build'
    image: openenv-sql_optimizer:latest
    container_name: sql-optimizer-env
    ports:
      - "8000:8000"
    environment:
      WORKERS: ${WORKERS:-4}
      MAX_CONCURRENT_ENVS: ${MAX_CONCURRENT_ENVS:-100}
      PORT: 8000
      HOST: 0.0.0.0
      MAX_STEPS: ${MAX_STEPS:-10}
      QUERY_TIMEOUT_MS: ${QUERY_TIMEOUT_MS:-30000}
      # Internal network name for the DB
      POSTGRES_HOST: sample-db
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sample
    restart: unless-stopped
    # This was causing the "undefined service" error because of the profile
    depends_on:
      - sample-db

  # ── Sample database (dev/testing only) ────────────────────────────────────
  sample-db:
    profiles: ["dev"]
    # Fixed image name for Bitnami (standard on Docker Hub)
    image: postgres:15
    container_name: sql-optimizer-sample-db
    environment:
      - POSTGRESQL_DATABASE=sample
      - POSTGRESQL_USERNAME=postgres
      - POSTGRESQL_PASSWORD=postgres
      # Critical for pg_hint_plan to work
      - POSTGRESQL_SHARED_PRELOAD_LIBRARIES=pg_hint_plan
    ports:
      - "5432:5432"
    volumes:
      - ./dev/sample_db_init.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sample"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  sample-db-data: